name: CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "transpiler/go.mod"
      - "transpiler/go.sum"
      - "lsp/go.mod"
      - "lsp/go.sum"
      - ".golangci*"
  workflow_call:
    inputs:
      skipTests:
        description: "Skip tests, useful when there is a dedicated CI job for tests"
        default: false
        required: false
        type: boolean

jobs:
  build:
    name: Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        module: [transpiler, lsp]

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          working-directory: ${{ matrix.module }}

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

      - name: Go Tidy
        run: go mod tidy && git diff --exit-code

      - name: Go Mod Verify
        run: go mod verify

      - name: Build
        run: go build -o /dev/null ./...

      - name: Compile Tests
        if: ${{ inputs.skipTests }}
        run: go test -exec /bin/true ./...

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: go test -v -count=1 -race -shuffle=on -coverprofile=coverage.txt ./...

      - name: Coverage summary
        if: ${{ !inputs.skipTests }}
        run: go tool cover -func=coverage.txt >> "$GITHUB_STEP_SUMMARY"
